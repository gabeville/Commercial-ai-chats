    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />

    <meta property="og:url" content="https://aida.experiasolutions.com.br" />
    <meta property="og:title" content="AIDA — Aprenda Inglês por Imersão Ativa" />
    <meta property="og:description" content="Converse com tutores de IA especializados e aprenda inglês do jeito que o cérebro foi feito para aprender — por imersão. Sem aulas chatas, sem gramática decorada." />
    <meta property="og:image" content="https://aida.experiasolutions.com.br/assets/aida-og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="AIDA — Plataforma de Imersão em Inglês com IA" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@experiasolutions" />
    <meta name="twitter:title" content="AIDA — Aprenda Inglês por Imersão Ativa" />
    <meta name="twitter:description" content="Converse com tutores de IA especializados e aprenda inglês do jeito que o cérebro foi feito para aprender — por imersão." />
    <meta name="twitter:image" content="https://aida.experiasolutions.com.br/assets/aida-og.png" />
    <meta name="twitter:image:alt" content="AIDA — Plataforma de Imersão em Inglês com IA" />

    <!-- Canonical -->
    <link rel="canonical" href="https://aida.experiasolutions.com.br" />

    <!-- Title & Favicons -->
    <title>AIDA — Aprenda Inglês por Imersão Ativa</title>
    <link rel="icon" type="image/svg+xml" href="/assets/logo.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/aida-og.png" />
    <link rel="apple-touch-icon" href="/assets/logo.svg" />

    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
    </style>
    <script>
      const theme = localStorage.getItem('color-theme');
      const loadingContainerStyle = document.createElement('style');
      let backgroundColor;

      if (theme === 'dark') {
        backgroundColor = '#0d0d0d';
      } else if (theme === 'light') {
        backgroundColor = '#ffffff';
      } else if (theme === 'system') {
        const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
        backgroundColor = prefersDarkScheme ? '#0d0d0d' : '#ffffff';
      } else {
        backgroundColor = '#ffffff';
      }

      loadingContainerStyle.innerHTML = `
        #loading-container {
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background-color: ${backgroundColor};
        }
      `;
      document.head.appendChild(loadingContainerStyle);
    </script>
    <script defer type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root">
      <div id="loading-container"></div>
    </div>
  </body>
</html>
